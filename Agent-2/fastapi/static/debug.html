<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Debug - Pipeline Inspector</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --panel-hover: #334155;
      --line: #334155;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #f59e0b;
      --accent2: #06b6d4;
      --green: #22c55e;
      --red: #ef4444;
      --orange: #f97316;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .topbar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 24px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topbar h1 { font-size: 16px; font-weight: 600; }
    .topbar a { color: var(--accent); text-decoration: none; font-size: 13px; }
    .topbar select, .topbar button {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 13px;
      cursor: pointer;
    }
    .topbar button:hover { border-color: var(--accent); }

    .layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      height: calc(100vh - 49px);
    }

    /* Left: pipeline stages */
    .sidebar {
      background: var(--panel);
      border-right: 1px solid var(--line);
      overflow-y: auto;
      padding: 16px 0;
    }
    .stage-item {
      padding: 10px 20px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: all 0.15s;
      font-size: 13px;
    }
    .stage-item:hover { background: var(--panel-hover); }
    .stage-item.active {
      border-left-color: var(--accent);
      background: rgba(245, 158, 11, 0.08);
    }
    .stage-item .stage-label { font-weight: 600; }
    .stage-item .stage-time { color: var(--muted); font-size: 11px; margin-top: 2px; }
    .stage-item .stage-count {
      float: right;
      background: var(--accent);
      color: #000;
      border-radius: 10px;
      padding: 1px 8px;
      font-size: 11px;
      font-weight: 600;
    }

    /* Main content */
    .main { overflow-y: auto; padding: 24px; }

    /* Cards */
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .card h3 {
      font-size: 15px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-ok { background: rgba(34, 197, 94, 0.15); color: var(--green); }
    .badge-warn { background: rgba(249, 115, 22, 0.15); color: var(--orange); }
    .badge-err { background: rgba(239, 68, 68, 0.15); color: var(--red); }

    /* Table */
    .debug-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .debug-table th {
      text-align: left;
      padding: 8px 10px;
      border-bottom: 2px solid var(--line);
      color: var(--muted);
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .debug-table td {
      padding: 8px 10px;
      border-bottom: 1px solid rgba(51, 65, 85, 0.5);
      vertical-align: top;
    }
    .debug-table tr:hover td { background: rgba(51, 65, 85, 0.3); }

    /* POI comparison */
    .poi-compare {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .poi-box {
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      font-size: 13px;
    }
    .poi-box h4 { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
    .poi-box .poi-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .poi-box .poi-addr { color: var(--muted); font-size: 12px; }
    .poi-box .poi-coord { color: var(--accent2); font-size: 12px; margin-top: 4px; }
    .arrow-col {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: var(--accent);
    }

    /* Map */
    .map-container {
      width: 100%;
      height: 400px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--line);
      margin-top: 12px;
    }

    /* Reflexion log */
    .reflexion-entry {
      padding: 8px 12px;
      border-left: 3px solid var(--line);
      margin-bottom: 6px;
      font-size: 13px;
      background: rgba(0,0,0,0.2);
      border-radius: 0 6px 6px 0;
    }
    .reflexion-entry.repair { border-left-color: var(--orange); }
    .reflexion-entry.stable { border-left-color: var(--green); }
    .reflexion-entry.maxround { border-left-color: var(--red); }

    /* Pipeline flow */
    .pipeline-flow {
      display: flex;
      gap: 0;
      align-items: center;
      margin-bottom: 24px;
      overflow-x: auto;
      padding-bottom: 8px;
    }
    .pipeline-step {
      padding: 8px 16px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      font-size: 12px;
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.15s;
    }
    .pipeline-step:hover { border-color: var(--accent); }
    .pipeline-step.active { background: rgba(245, 158, 11, 0.15); border-color: var(--accent); }
    .pipeline-arrow { color: var(--muted); font-size: 16px; padding: 0 4px; }

    /* Json viewer */
    .json-block {
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      font-family: "Cascadia Code", "Fira Code", monospace;
      font-size: 12px;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 400px;
      overflow-y: auto;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }
    .empty-state h2 { font-size: 20px; margin-bottom: 8px; color: var(--text); }
    .empty-state p { font-size: 14px; margin-bottom: 24px; }
    .empty-state button {
      background: var(--accent);
      color: #000;
      border: none;
      padding: 10px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .poi-compare { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <h1>Debug Pipeline</h1>
  <select id="sessionSelect"><option value="">-- select session --</option></select>
  <button id="refreshBtn">Refresh</button>
  <a href="/">Back to App</a>
</div>

<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main" id="mainContent">
    <div class="empty-state">
      <h2>No session selected</h2>
      <p>Select a session from the dropdown or send a chat message first.</p>
      <button onclick="location.href='/'">Go to Chat</button>
    </div>
  </div>
</div>

<script>
const API = "";
let mapConfig = null;
let amapMap = null;
let mapMarkers = [];
let mapPolylines = [];

// ── Init ──────────────────────────────────────────────
async function init() {
  await loadMapConfig();
  await loadSessions();
  const params = new URLSearchParams(location.search);
  const sid = params.get("session_id");
  if (sid) {
    document.getElementById("sessionSelect").value = sid;
    await loadDebugData(sid);
  }
}

document.getElementById("sessionSelect").addEventListener("change", async (e) => {
  const sid = e.target.value;
  if (sid) {
    const url = new URL(location);
    url.searchParams.set("session_id", sid);
    history.replaceState(null, "", url);
    await loadDebugData(sid);
  }
});

document.getElementById("refreshBtn").addEventListener("click", async () => {
  const sid = document.getElementById("sessionSelect").value;
  if (sid) await loadDebugData(sid);
});

// ── API calls ──────────────────────────────────────────
async function api(path) {
  const res = await fetch(API + path);
  if (!res.ok) throw new Error(`API ${path}: ${res.status}`);
  return res.json();
}

async function loadMapConfig() {
  try { mapConfig = await api("/map/config"); } catch {}
}

async function loadSessions() {
  try {
    const data = await api("/sessions");
    const sel = document.getElementById("sessionSelect");
    const items = data.sessions || data.items || [];
    sel.innerHTML = '<option value="">-- select session --</option>';
    items.forEach(s => {
      const opt = document.createElement("option");
      opt.value = s.id;
      opt.textContent = `${s.title || s.id} (${(s.message_count || 0)} msgs)`;
      sel.appendChild(opt);
    });
  } catch {}
}

async function loadDebugData(sessionId) {
  const main = document.getElementById("mainContent");
  main.innerHTML = "<p>Loading...</p>";
  try {
    const data = await api(`/api/debug/pipeline/${sessionId}`);
    renderDebugView(data);
  } catch (err) {
    main.innerHTML = `<div class="card"><h3>Error</h3><p>${escHtml(err.message)}</p></div>`;
  }
}

// ── Render ─────────────────────────────────────────────
function renderDebugView(data) {
  const main = document.getElementById("mainContent");
  main.innerHTML = "";

  // Pipeline flow header
  const flow = document.createElement("div");
  flow.className = "pipeline-flow";
  const stages = [
    { key: "requirement", label: "Requirement", icon: "📋" },
    { key: "recall", label: "LLM Recall", icon: "🤖" },
    { key: "grounding", label: "POI Grounding", icon: "📍" },
    { key: "planner", label: "Planner", icon: "🗓" },
    { key: "reflexion", label: "Reflexion", icon: "🔄" },
    { key: "result", label: "Result", icon: "✅" },
  ];
  stages.forEach((s, i) => {
    if (i > 0) {
      const arrow = document.createElement("span");
      arrow.className = "pipeline-arrow";
      arrow.textContent = "→";
      flow.appendChild(arrow);
    }
    const step = document.createElement("div");
    step.className = "pipeline-step";
    step.dataset.stage = s.key;
    step.textContent = `${s.icon} ${s.label}`;
    step.onclick = () => {
      document.querySelectorAll(".pipeline-step").forEach(el => el.classList.remove("active"));
      step.classList.add("active");
      const target = document.getElementById("stage-" + s.key);
      if (target) target.scrollIntoView({ behavior: "smooth", block: "start" });
    };
    flow.appendChild(step);
  });
  main.appendChild(flow);

  // Sidebar stages
  renderSidebar(stages, data);

  // Stage 1: Requirement
  main.appendChild(renderRequirement(data));

  // Stage 2: LLM Recall
  main.appendChild(renderLLMRecall(data));

  // Stage 3: POI Grounding
  main.appendChild(renderPOIGrounding(data));

  // Stage 4: Planner
  main.appendChild(renderPlanner(data));

  // Stage 5: Reflexion
  main.appendChild(renderReflexion(data));

  // Stage 6: Result / Map
  main.appendChild(renderResult(data));

  // Init map
  setTimeout(() => initMap(data), 100);
}

function renderSidebar(stages, data) {
  const sidebar = document.getElementById("sidebar");
  sidebar.innerHTML = "";
  const req = data.requirement || {};
  const recall = data.candidate_recall || {};
  const grounded = data.grounded_pois || [];
  const itinerary = data.itinerary || {};
  const reflexionLog = data.reflexion_log || [];

  const counts = {
    requirement: req.city ? "1" : "0",
    recall: (recall.candidates || []).length,
    grounding: grounded.length,
    planner: (itinerary.days || []).length,
    reflexion: reflexionLog.length,
    result: (itinerary.days || []).reduce((n, d) => n + (d.items || []).length, 0),
  };

  stages.forEach(s => {
    const item = document.createElement("div");
    item.className = "stage-item";
    item.innerHTML = `
      <span class="stage-label">${s.icon} ${s.label}</span>
      <span class="stage-count">${counts[s.key] || 0}</span>
      <div class="stage-time"></div>
    `;
    item.onclick = () => {
      document.querySelectorAll(".stage-item").forEach(el => el.classList.remove("active"));
      item.classList.add("active");
      const target = document.getElementById("stage-" + s.key);
      if (target) target.scrollIntoView({ behavior: "smooth", block: "start" });
    };
    sidebar.appendChild(item);
  });
}

function renderRequirement(data) {
  const req = data.requirement || {};
  const card = document.createElement("div");
  card.className = "card";
  card.id = "stage-requirement";
  card.innerHTML = `
    <h3>📋 Requirement / 需求解析</h3>
    <table class="debug-table">
      <tr><th>City</th><td>${escHtml(req.city || "-")}</td></tr>
      <tr><th>Days</th><td>${req.day_count || "-"}</td></tr>
      <tr><th>Style</th><td>${escHtml(req.style || "-")}</td></tr>
      <tr><th>Interests</th><td>${(req.interests || []).map(escHtml).join(", ") || "-"}</td></tr>
      <tr><th>Must Have</th><td>${(req.must_have || []).map(escHtml).join(", ") || "-"}</td></tr>
      <tr><th>Radius</th><td>${req.radius_meters || "-"}m</td></tr>
      <tr><th>Food Interest</th><td><span class="badge ${req.has_food_interest ? 'badge-warn' : 'badge-ok'}">${req.has_food_interest ? "Yes" : "No"}</span></td></tr>
    </table>
  `;
  return card;
}

function renderLLMRecall(data) {
  const recall = data.candidate_recall || {};
  const candidates = recall.candidates || [];
  const card = document.createElement("div");
  card.className = "card";
  card.id = "stage-recall";
  card.innerHTML = `
    <h3>🤖 LLM Candidate Recall / 大模型候选召回</h3>
    <p style="color:var(--muted);font-size:13px;margin-bottom:12px;">
      Assumptions: ${escHtml(recall.assumptions || "-")}
    </p>
    ${candidates.length === 0 ? '<p style="color:var(--muted)">No candidates returned.</p>' : `
    <table class="debug-table">
      <tr><th>#</th><th>Query</th><th>Kind</th><th>Reason</th><th>Preferred Slots</th></tr>
      ${candidates.map((c, i) => `
        <tr>
          <td>${i + 1}</td>
          <td><strong>${escHtml(c.candidate_name || c.query || "-")}</strong></td>
          <td><span class="badge badge-ok">${escHtml(c.kind || "-")}</span></td>
          <td style="color:var(--muted)">${escHtml(c.reason || "-")}</td>
          <td>${(c.preferred_slots || []).map(escHtml).join(", ")}</td>
        </tr>
      `).join("")}
    </table>`}
  `;
  return card;
}

function renderPOIGrounding(data) {
  const grounded = data.grounded_pois || [];
  const card = document.createElement("div");
  card.className = "card";
  card.id = "stage-grounding";
  card.innerHTML = `
    <h3>📍 POI Grounding / 高德地图精确选址</h3>
    <p style="color:var(--muted);font-size:13px;margin-bottom:12px;">
      ${grounded.length} POIs resolved via AMap API
    </p>
    ${grounded.length === 0 ? '<p style="color:var(--muted)">No grounded POIs.</p>' : `
    <table class="debug-table">
      <tr><th>#</th><th>LLM Query → AMap Name</th><th>Address</th><th>Category</th><th>Location</th></tr>
      ${grounded.map((poi, i) => {
        const loc = poi.location || {};
        const locStr = loc.lat && loc.lng ? `${Number(loc.lat).toFixed(4)}, ${Number(loc.lng).toFixed(4)}` : "-";
        return `<tr>
          <td>${i + 1}</td>
          <td>
            <div style="color:var(--muted);font-size:11px;">${escHtml(poi.matched_query || poi.query || "")}</div>
            <div><strong>${escHtml(poi.name || "-")}</strong></div>
          </td>
          <td style="color:var(--muted);font-size:12px">${escHtml(poi.address || poi.cityname || "-")}</td>
          <td><span class="badge badge-ok">${escHtml(poi.place_kind || poi.type || "-")}</span></td>
          <td class="poi-coord">${locStr}</td>
        </tr>`;
      }).join("")}
    </table>`}
  `;
  return card;
}

function renderPlanner(data) {
  const itinerary = data.itinerary || {};
  const days = itinerary.days || [];
  const card = document.createElement("div");
  card.className = "card";
  card.id = "stage-planner";
  card.innerHTML = `
    <h3>🗓 Planner / 按天分配</h3>
    ${days.length === 0 ? '<p style="color:var(--muted)">No itinerary days.</p>' : days.map(day => `
      <h4 style="margin: 12px 0 8px; font-size: 14px;">Day ${day.day_index || day.day || "?"} — ${escHtml(day.theme || "")}</h4>
      <table class="debug-table">
        <tr><th>Slot</th><th>Name</th><th>Kind</th><th>Location</th><th>POI ID</th></tr>
        ${(day.items || []).map(item => {
          const sel = (item.selected_places || [{}])[0] || {};
          const loc = sel.location || {};
          const locStr = loc.lat && loc.lng ? `${Number(loc.lat).toFixed(4)}, ${Number(loc.lng).toFixed(4)}` : "-";
          return `<tr>
            <td>${escHtml(item.slot || "-")}</td>
            <td><strong>${escHtml(item.name || sel.name || item.text || "-")}</strong></td>
            <td><span class="badge badge-ok">${escHtml(sel.place_kind || "-")}</span></td>
            <td class="poi-coord">${locStr}</td>
            <td style="color:var(--muted);font-size:11px;">${escHtml(sel.poi_id || "-")}</td>
          </tr>`;
        }).join("")}
      </table>
    `).join("")}
  `;
  return card;
}

function renderReflexion(data) {
  const reflexionLog = data.reflexion_log || [];
  const stable = data.reflexion_stable;
  const card = document.createElement("div");
  card.className = "card";
  card.id = "stage-reflexion";
  card.innerHTML = `
    <h3>🔄 Reflexion / 两轮验证</h3>
    <p style="margin-bottom:12px;">
      Status: <span class="badge ${stable ? 'badge-ok' : 'badge-err'}">${stable ? "STABLE" : "UNSTABLE"}</span>
    </p>
    ${reflexionLog.length === 0 ? '<p style="color:var(--muted)">No reflexion log entries.</p>' : `
      ${reflexionLog.map(entry => {
        const text = typeof entry === "string" ? entry : JSON.stringify(entry);
        let cls = "reflexion-entry";
        if (text.includes("[repair]")) cls += " repair";
        else if (text.includes("stable")) cls += " stable";
        else if (text.includes("max rounds")) cls += " maxround";
        return `<div class="${cls}">${escHtml(text)}</div>`;
      }).join("")}
    `}
  `;
  return card;
}

function renderResult(data) {
  const itinerary = data.itinerary || {};
  const days = itinerary.days || [];
  const warnings = data.planner_warnings || [];
  const card = document.createElement("div");
  card.className = "card";
  card.id = "stage-result";
  card.innerHTML = `
    <h3>✅ Final Result / 最终结果</h3>
    <p style="margin-bottom:12px;">
      ${days.length} days, ${days.reduce((n, d) => n + (d.items || []).length, 0)} places total.
      ${warnings.length ? `<span class="badge badge-warn">${warnings.length} warnings</span>` : '<span class="badge badge-ok">No warnings</span>'}
    </p>
    ${warnings.length ? `
      <details style="margin-bottom:12px;">
        <summary style="cursor:pointer;color:var(--muted);font-size:13px;">Show warnings (${warnings.length})</summary>
        <div class="json-block" style="margin-top:8px;">${warnings.map(escHtml).join("\n")}</div>
      </details>
    ` : ""}
    <div class="map-container" id="debugMap"></div>
  `;
  return card;
}

// ── Map ────────────────────────────────────────────────
function initMap(data) {
  const container = document.getElementById("debugMap");
  if (!container || !mapConfig || !mapConfig.enabled || !window.AMap) {
    if (container) container.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted)">Map unavailable — check AMAP_BROWSER_KEY</div>';
    return;
  }

  const days = (data.itinerary || {}).days || [];
  const allPoints = [];
  days.forEach(day => {
    (day.items || []).forEach(item => {
      const sel = (item.selected_places || [{}])[0] || {};
      const loc = sel.location;
      if (loc && loc.lat && loc.lng) {
        allPoints.push({
          name: item.name || sel.name || "?",
          lat: Number(loc.lat),
          lng: Number(loc.lng),
          day: day.day_index || day.day || 1,
          slot: item.slot || "",
          kind: sel.place_kind || "",
        });
      }
    });
  });

  if (!allPoints.length) {
    container.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted)">No mappable points</div>';
    return;
  }

  const center = allPoints.reduce((acc, p) => ({ lat: acc.lat + p.lat, lng: acc.lng + p.lng }), { lat: 0, lng: 0 });
  center.lat /= allPoints.length;
  center.lng /= allPoints.length;

  amapMap = new AMap.Map("debugMap", {
    zoom: 12,
    center: [center.lng, center.lat],
    mapStyle: "amap://styles/dark",
  });

  const dayColors = ["#f59e0b", "#06b6d4", "#22c55e", "#ef4444", "#a855f7", "#ec4899"];

  // Clear old markers
  mapMarkers.forEach(m => amapMap.remove(m));
  mapMarkers = [];
  mapPolylines.forEach(p => amapMap.remove(p));
  mapPolylines = [];

  const dayGroups = {};
  allPoints.forEach(p => {
    const dk = p.day;
    if (!dayGroups[dk]) dayGroups[dk] = [];
    dayGroups[dk].push(p);
  });

  Object.entries(dayGroups).forEach(([dayKey, points]) => {
    const color = dayColors[(Number(dayKey) - 1) % dayColors.length];
    // Markers
    points.forEach((p, i) => {
      const marker = new AMap.Marker({
        position: [p.lng, p.lat],
        title: `Day${dayKey} ${p.slot} ${p.name}`,
        label: {
          content: `<span style="background:${color};color:#fff;padding:1px 6px;border-radius:4px;font-size:11px;white-space:nowrap;">${i+1}. ${p.name}</span>`,
          direction: "top",
        },
      });
      amapMap.add(marker);
      mapMarkers.push(marker);
    });
    // Polyline
    if (points.length >= 2) {
      const path = points.map(p => [p.lng, p.lat]);
      const polyline = new AMap.Polyline({
        path: path,
        strokeColor: color,
        strokeWeight: 3,
        strokeOpacity: 0.7,
        lineJoin: "round",
      });
      amapMap.add(polyline);
      mapPolylines.push(polyline);
    }
  });

  amapMap.setFitView(mapMarkers, false, [60, 60, 60, 60]);
}

// ── Helpers ────────────────────────────────────────────
function escHtml(text) {
  if (text == null) return "";
  const div = document.createElement("div");
  div.textContent = String(text);
  return div.innerHTML;
}

// ── AMap SDK Loader ────────────────────────────────────
function loadAmapSDK() {
  return new Promise((resolve) => {
    if (!mapConfig || !mapConfig.enabled || !mapConfig.browserKey) {
      resolve();
      return;
    }
    if (window.AMap) { resolve(); return; }
    window._AMapSecurityConfig = { securityJsCode: mapConfig.securityJsCode || "" };
    const s = document.createElement("script");
    s.src = `https://webapi.amap.com/maps?v=2.0&key=${mapConfig.browserKey}`;
    s.onload = resolve;
    s.onerror = resolve;
    document.head.appendChild(s);
  });
}

// Boot
(async () => {
  await loadMapConfig();
  await loadAmapSDK();
  await loadSessions();
  const params = new URLSearchParams(location.search);
  const sid = params.get("session_id");
  if (sid) {
    document.getElementById("sessionSelect").value = sid;
    await loadDebugData(sid);
  }
})();
</script>
