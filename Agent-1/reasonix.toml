# Reasonix configuration.
# Resolution order: flag > ./reasonix.toml > ~/AppData/Roaming/reasonix/config.toml > built-in defaults.
# Secrets come from the environment via api_key_env; never put keys here.

config_version = 3   # schema marker for diagnostics; old versions may ignore it
default_model = "deepseek-flash"
# language      = "zh"   # ui/model language; empty = auto-detect from $LANG / $REASONIX_LANG

[agent]
# system_prompt = """..."""   # omit to use the built-in prompt for this version
# system_prompt_file = "prompts/system.md"   # overrides system_prompt when set
# max_steps         = 0   # executor tool-call rounds; 0 = no limit
# planner_max_steps = 12   # planner read-only tool-call rounds; 0 = no limit
temperature       = 0.0
auto_plan   = "off"   # off|on; off keeps plan mode manual
# reasoning_language = "zh"   # visible reasoning language: auto|zh|en
# auto_plan_classifier = "deepseek-flash"   # optional; only used for borderline tasks
soft_compact_ratio  = 0.5   # notice only; keeps cache-first prefix intact
compact_ratio       = 0.8   # try compacting when prompt reaches this fraction
compact_force_ratio = 0.9   # force compacting at this high-water mark
# keep                = ["errors"]   # compaction keep policy: errors, user_marked
# recent_keep         = 2   # minimum recent messages kept verbatim
cold_resume_prune   = true   # elide stale tool results when reopening a session past the provider cache window
# planner_model = "mimo"   # optional: enable two-model collaboration
# subagent_model = "deepseek-pro"   # optional default for runAs=subagent skills
# subagent_models = { review = "deepseek-pro", security_review = "deepseek-pro" }   # per-skill overrides
# subagent_effort = "high"   # optional default effort for subagents
# subagent_efforts = { review = "max", task = "high" }   # per-tool/skill effort overrides
# output_style = "explanatory"   # explanatory | learning | concise | custom; empty = default

[tools]
enabled = []   # empty = all built-in tools
bash_timeout_seconds = 120   # foreground safety cap; set 0 for no tool-local cap

[tools.background_jobs]
stalled_warning_seconds = 900   # warn once per background job after this many quiet seconds; 0 disables

[lsp]
enabled = true   # language server tools; servers launch lazily when used
# [lsp.servers.go]
# command = "gopls"
# args = []
# extensions = [".go"]

[skills]
# paths = ["~/my-skills", "../shared/skills"]   # extra custom skill roots
# excluded_paths = ["~/.agents/skills"]   # hide convention roots without deleting folders
# max_depth = 3   # nested scan depth; set 1 for legacy root-only discovery
# disabled_skills = ["review"]   # hide noisy or unwanted skills

[permissions]
# Per-call gating. mode = writer fallback when no rule matches: ask|allow|deny.
# Readers always default to allow. Precedence: deny > ask > allow > fallback.
# Rules are "Tool" or "Tool(specifier)"; e.g. Bash(go test:*), Edit(src/**).
mode  = "ask"
# deny = ["Bash(rm -rf*)", "Bash(git push*)"]   # hard-blocked in every mode
allow = ["Bash(docker ps --format \"table {{.Names}}\\t{{.Status}}\\t{{.Ports}}\" 2>&1)", "Bash(curl -s -o /dev/null -w \"%{http_code}\" http://127.0.0.1:8000/docs 2>&1 || echo \"NOT_RUNNING\")", "Bash(curl -s http://127.0.0.1:8000/api/v1/patients/ 2>&1 | head -50)", "Bash(curl -s http://127.0.0.1:8000/health 2>&1 || echo \"no /health endpoint\")", "Bash(curl -s http://127.0.0.1:8000/api/v1/mcp/agent/health 2>&1)", "Bash(curl -s http://127.0.0.1:8000/openapi.json 2>&1 | python -c \"import sys,json; d=json.load(sys.stdin); print('Routes:', len(d.get('paths',{}))); [print(f'  {m.upper():6s} {p}') for p,v in sorted(d['paths'].items()) for m in v]\" 2>&1)", "Bash(cd /d/zhuomian/agent/Agent-1 && python -m pytest tests/ -v --tb=line 2>&1 | grep -E \"passed|failed|ERROR|FAILED\")", "Bash(cd /d/zhuomian/agent/Agent-1 && python -m pytest tests/test_bulk_import.py -v --tb=line 2>&1 | grep -E \"passed|failed|ERROR|FAILED|test_\")", "Bash(cd /d/zhuomian/agent/Agent-1 && python -m pytest tests/test_bulk_import.py::TestKnowledgeChunkGeneration -v --tb=line 2>&1 | grep -E \"passed|failed|ERROR\")", "Bash(cd /d/zhuomian/agent/Agent-1 && python -m pytest tests/ --collect-only 2>&1 | grep \"selected\")", "Bash(cd /d/zhuomian/agent/Agent-1 && python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 --reload &\nsleep 3 && curl -s -o /dev/null -w \"%{http_code}\" http://127.0.0.1:8000/evaluate 2>/dev/null)", "Bash(cd /d/zhuomian/agent/Agent-1 && python -c \"\nfrom app.main import app\nfound = False\nfor r in app.routes:\n    p = getattr(r, 'path', str(getattr(r, 'path_regex', '')))\n    if 'evaluate' in p.lower():\n        print(f'  FOUND: {p}')\n        found = True\n    if p == '/evaluate':\n        print(f'  EXACT MATCH: {p}')\nif not found:\n    print('  NOT FOUND in routes')\n    # List all routes\n    for r in app.routes:\n        p = getattr(r, 'path', str(getattr(r, 'path_regex', '')))\n        print(f'  Route: {p}')\n\" 2>&1 | grep -E \"(FOUND|NOT |Route:|MATCH)\")", "Bash(curl -s http://127.0.0.1:8000/evaluate 2>/dev/null | head -c 200)", "Bash(cd /d/zhuomian/agent/Agent-1 && python -c \"\nfrom app.main import app\nfor i, r in enumerate(app.routes):\n    p = getattr(r, 'path', str(getattr(r, 'path_regex', '')))\n    if 'evaluate' in p.lower() or p in ('/', '/{path:path}', ''):\n        print(f'  [{i}] {type(r).__name__}: {p}')\n\" 2>&1 | grep -vE \"(UserWarning|warnings|INFO|Logging|CORS|Rate|Patient|Prometheus)\")", "Bash(cd /d/zhuomian/agent/Agent-1 && python -c \"\nfrom app.main import app\nfor i, r in enumerate(app.routes):\n    p = getattr(r, 'path', str(getattr(r, 'path_regex', '')))[:50]\n    m = getattr(r, 'methods', '')\n    print(f'  [{i}] {type(r).__name__:20s} {str(m):20s} {p}')\n\" 2>&1 | grep -vE \"(UserWarning|warnings|INFO|Logging|CORS|Rate|Patient|Prometheus)\")", "Bash(cd /d/zhuomian/agent/Agent-1 && python -c \"\nimport os\nAPP_DIR = os.path.join(os.path.dirname(os.path.abspath('app/main.py')), 'app') if False else os.path.dirname(os.path.abspath('app/main.py'))\nAPP_DIR2 = os.path.dirname(os.path.abspath(__file__)) if '__file__' in dir() else 'unknown'\n# Just test the actual file\npath = os.path.join('app', 'static', 'evaluate.html')\nprint(f'File exists: {os.path.exists(path)}')\nprint(f'Absolute: {os.path.abspath(path)}')\n\" 2>&1 | grep -vE \"(UserWarning|warnings)\")", "Bash(cd /d/zhuomian/agent/Agent-1 && python -c \"\nfrom app.main import app\nfrom fastapi.testclient import TestClient\nclient = TestClient(app)\nresp = client.get('/evaluate')\nprint(f'Status: {resp.status_code}')\nprint(f'Headers: {dict(resp.headers)}')\nprint(f'Body start: {resp.text[:100]}')\n\" 2>&1 | grep -vE \"(UserWarning|warnings|INFO|Logging|CORS|Rate|Patient|Prometheus)\")", "Bash(# Find and kill ALL processes on port 8000\nfor pid in $(netstat -ano 2>/dev/null | grep \":8000\" | grep LISTENING | awk '{print $5}'); do\n  kill -9 $pid 2>/dev/null || true\ndone\nsleep 1\n# Verify port is free\nnetstat -ano 2>/dev/null | grep \":8000\" || echo \"Port 8000 is free\")", "Bash(kill -9 31648 42824 2>/dev/null; sleep 2; netstat -ano 2>/dev/null | grep \":8000\" || echo \"Port 8000 now free\")", "Bash(taskkill //f //pid 31648 2>/dev/null; taskkill //f //pid 42824 2>/dev/null; sleep 2; netstat -ano 2>/dev/null | grep \":8000\" || echo \"free\")", "Edit", "install_source", "Bash(rmdir /s:*)", "Bash(cmd /c:*)", "explore", "Bash(node .claude/skills/impeccable/scripts/context.mjs:*)", "Bash(echo --- Backend Log --- && type \"C:\\Users\\31307\\AppData\\Local\\Temp\\agent1_backend.log\" 2>nul || echo \"日志文件不存在\")"]
# ask = ["Edit(src/**)"]   # force a prompt even if otherwise allowed

[sandbox]
# Confine tool blast radius. File-writers (write_file/edit_file/multi_edit/move_file)
# may only write under workspace_root (empty = current dir) and allow_write extras.
# bash = "enforce" (default) jails each command in an OS sandbox (macOS now;
# graceful fallback elsewhere); "off" disables it. network allows egress.
# workspace_root = ""            # default: current working directory
# allow_write = ["/tmp"]          # extra dirs writers may also modify
bash    = "enforce"
network = true

[statusline]
# A custom status line: a command whose first stdout line replaces the built-in
# data row. It receives {"model","contextUsed","contextWindow","cwd"} as JSON on stdin.
# command = "my-statusline.sh"

# External MCP servers. type: "stdio" (default, a subprocess) | "http" | "sse".
