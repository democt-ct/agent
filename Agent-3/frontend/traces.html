<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>执行追踪 — 企业多专家 Agent</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .traces-page { max-width: 100%; margin: 0 auto; padding: 24px; }
    .trace-card { background: var(--color-surface); border: 1px solid var(--color-line); border-radius: 16px; margin-bottom: 12px; overflow: hidden; }
    .trace-header { display: flex; align-items: center; gap: 12px; padding: 14px 18px; cursor: pointer; }
    .trace-query { flex: 1; font-weight: 600; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .trace-meta { font-size: 12px; color: var(--color-text-muted); display: flex; gap: 12px; flex-shrink: 0; }
    .trace-body { display: none; padding: 0 18px 14px; border-top: 1px solid var(--color-line); }
    .trace-card.open .trace-body { display: block; }
    .trace-badge { padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 600; background: var(--color-primary-light); color: var(--color-primary); }
    .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--color-primary); font-size: 14px; font-weight: 600; margin-bottom: 20px; }
    .page-title { font-size: 22px; font-weight: 700; margin-bottom: 20px; }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--color-text-muted); }
  </style>
</head>
<body>
<div class="traces-page">
  <a href="/" class="back-link">← 返回主页</a>
  <div class="page-title">执行追踪</div>
  <div id="traces-list"><div class="empty-state">加载中...</div></div>
</div>
<script>
(function() {
  async function load() {
    const el = document.getElementById('traces-list');
    try {
      const r = await fetch('/api/traces');
      if (!r.ok) throw new Error('no api');
      const data = await r.json();
      render(el, data.traces || []);
    } catch {
      el.innerHTML = '<div class="empty-state">暂无追踪数据<br><small>运行几次对话后再来查看</small></div>';
    }
  }

  function render(el, traces) {
    if (!traces.length) {
      el.innerHTML = '<div class="empty-state">暂无追踪数据<br><small>运行几次对话后再来查看</small></div>';
      return;
    }
    el.innerHTML = traces.map((t, i) => {
      const method = (t.routing || {}).method || '-';
      const agent = t.agent_name || '-';
      const tools = (t.tool_calls || []).map(tc =>
        `<div style="margin:4px 0;font-size:12px;padding:6px 10px;background:var(--color-bg);border-radius:8px">
          <strong>${esc(tc.name)}</strong>: ${esc(JSON.stringify(tc.arguments || {}).slice(0,80))}
        </div>`
      ).join('');
      const chunks = (t.retrieved_chunks || []).slice(0,3).map(c =>
        `<div style="margin:4px 0;font-size:12px;padding:6px 10px;background:var(--color-bg);border-radius:8px">
          <span style="color:var(--color-primary);font-weight:600">${esc(c.source||'?')}</span>
          <span style="color:var(--color-text-muted);margin-left:8px">相关度 ${(c.score||0).toFixed(2)}</span>
        </div>`
      ).join('');
      return `<div class="trace-card" id="tc${i}">
        <div class="trace-header" onclick="document.getElementById('tc${i}').classList.toggle('open')">
          <span class="trace-badge">${esc(agent)}</span>
          <span class="trace-query">${esc(t.query || '')}</span>
          <div class="trace-meta">
            <span>${t.processing_time_ms || 0}ms</span>
            <span>${t.tokens_used || 0} tokens</span>
            <span>${esc(method)}</span>
          </div>
        </div>
        <div class="trace-body">
          ${tools ? `<div style="margin-top:10px"><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--color-text-muted);margin-bottom:6px">工具调用</div>${tools}</div>` : ''}
          ${chunks ? `<div style="margin-top:10px"><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--color-text-muted);margin-bottom:6px">知识检索</div>${chunks}</div>` : ''}
          ${!tools && !chunks ? '<div style="color:var(--color-text-muted);font-size:13px;padding:8px 0">无工具调用和知识检索</div>' : ''}
        </div>
      </div>`;
    }).join('');
  }

  function esc(s) { const d = document.createElement('div'); d.textContent = String(s||''); return d.innerHTML; }
  load();
})();
</script>
</body>
</html>
