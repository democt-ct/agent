<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台 — 企业多专家 Agent</title>
  <link rel="stylesheet" href="style.css">
  <style>
    :root { --sidebar-width: 220px; }
    .admin-layout { display: flex; height: 100vh; }
    .admin-nav {
      width: var(--sidebar-width); background: var(--color-sidebar);
      color: #fff; display: flex; flex-direction: column; flex-shrink: 0;
      padding: 24px 0 16px;
    }
    .admin-nav-logo {
      padding: 0 20px 20px; font-size: 16px; font-weight: 700;
      border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 12px;
    }
    .admin-nav-item {
      padding: 10px 20px; cursor: pointer; font-size: 14px; color: #CBD5E1;
      transition: background 150ms; border-radius: 0;
    }
    .admin-nav-item:hover { background: rgba(255,255,255,0.08); }
    .admin-nav-item.active { background: var(--color-primary); color: #fff; }
    .admin-nav-back {
      margin-top: auto; padding: 10px 20px; font-size: 13px;
      color: var(--color-text-muted); cursor: pointer;
    }
    .admin-nav-back:hover { color: #fff; }
    .admin-main {
      flex: 1; overflow-y: auto; background: var(--color-bg);
      padding: 28px 32px;
    }
    .admin-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px;
    }
    .admin-title { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
    .admin-login {
      display: flex; gap: 10px; align-items: center;
      background: rgba(255,255,255,0.9); border: 1px solid var(--color-line);
      border-radius: 14px; padding: 12px 16px; margin-bottom: 24px;
      box-shadow: var(--shadow-sm);
    }
    .admin-login select, .admin-login input {
      padding: 8px 12px; border: 1px solid var(--color-line);
      border-radius: 10px; font-size: 14px; font-family: inherit;
    }
    .admin-login button {
      padding: 8px 18px; background: var(--color-primary); color: #fff;
      border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .admin-login button:hover { background: var(--color-primary-hover); }
    .admin-section { display: none; }
    .admin-section.active { display: block; }
    .card {
      background: rgba(255,255,255,0.92); border: 1px solid var(--color-line);
      border-radius: 18px; padding: 20px 24px; margin-bottom: 20px;
      box-shadow: var(--shadow-sm);
    }
    .card-title {
      font-size: 15px; font-weight: 700; margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
    }
    .badge {
      display: inline-flex; align-items: center; padding: 2px 10px;
      border-radius: 99px; font-size: 12px; font-weight: 600;
    }
    .badge-pending { background: #FEF3C7; color: #92400E; }
    .badge-approved { background: #D1FAE5; color: #065F46; }
    .badge-rejected { background: #FEE2E2; color: #991B1B; }
    .badge-active   { background: #DBEAFE; color: #1E40AF; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: var(--color-bg); font-weight: 600; text-align: left;
         padding: 10px 12px; border-bottom: 2px solid var(--color-line); }
    td { padding: 10px 12px; border-bottom: 1px solid var(--color-line-light);
         vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(99,102,241,0.03); }
    .btn-sm {
      padding: 4px 12px; border-radius: 8px; font-size: 12px; font-weight: 600;
      cursor: pointer; border: none; transition: all 150ms;
    }
    .btn-approve { background: #D1FAE5; color: #065F46; }
    .btn-approve:hover { background: #059669; color: #fff; }
    .btn-reject  { background: #FEE2E2; color: #991B1B; }
    .btn-reject:hover  { background: #DC2626; color: #fff; }
    .btn-edit    { background: var(--color-primary-light); color: var(--color-primary); }
    .btn-edit:hover { background: var(--color-primary); color: #fff; }
    .filter-bar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
    .filter-bar select, .filter-bar input {
      padding: 7px 12px; border: 1px solid var(--color-line);
      border-radius: 10px; font-size: 13px; font-family: inherit;
      background: #fff;
    }
    .filter-bar button {
      padding: 7px 16px; background: var(--color-primary); color: #fff;
      border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer;
      border: none;
    }
    .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }
    .stat-card {
      background: rgba(255,255,255,0.92); border: 1px solid var(--color-line);
      border-radius: 16px; padding: 18px 20px; box-shadow: var(--shadow-xs);
    }
    .stat-label { font-size: 12px; color: var(--color-text-muted); margin-bottom: 6px; }
    .stat-value { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; }
    .edit-modal {
      position: fixed; inset: 0; background: rgba(15,23,42,0.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; backdrop-filter: blur(4px);
    }
    .edit-modal.hidden { display: none; }
    .edit-dialog {
      background: #fff; border-radius: 20px; padding: 28px;
      width: 420px; box-shadow: var(--shadow-lg);
    }
    .edit-dialog h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
    .edit-dialog label { display: block; font-size: 12px; font-weight: 600;
      color: var(--color-text-secondary); margin: 10px 0 4px; }
    .edit-dialog input, .edit-dialog select {
      width: 100%; padding: 8px 12px; border: 1px solid var(--color-line);
      border-radius: 10px; font-size: 14px; font-family: inherit; box-sizing: border-box;
    }
    .edit-dialog input:focus, .edit-dialog select:focus {
      outline: none; border-color: var(--color-primary);
      box-shadow: 0 0 0 3px var(--color-primary-ring);
    }
    .edit-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
    .edit-actions button {
      padding: 9px 20px; border-radius: 10px; font-size: 14px;
      font-weight: 600; cursor: pointer; border: none;
    }
    .btn-cancel-edit { background: var(--color-bg); color: var(--color-text-secondary); }
    .btn-save-edit { background: var(--color-primary); color: #fff; }
    #auth-bar { font-size: 13px; color: var(--color-text-muted); }
    #auth-bar strong { color: var(--color-text); }
  </style>
</head>
<body>
<div class="admin-layout">
  <nav class="admin-nav">
    <div class="admin-nav-logo">⚙️ 管理后台</div>
    <div class="admin-nav-item active" data-tab="dashboard">📊 概览</div>
    <div class="admin-nav-item" data-tab="users">👥 用户管理</div>
    <div class="admin-nav-item" data-tab="leaves">📋 请假记录</div>
    <div class="admin-nav-item" data-tab="approvals">✅ 审批记录</div>
    <div class="admin-nav-item" data-tab="expenses">💰 报销记录</div>
    <div class="admin-nav-item" data-tab="eval">📊 评估报告</div>
    <div class="admin-nav-back" onclick="location.href='/'">← 返回主界面</div>
  </nav>

  <main class="admin-main">
    <!-- 登录栏 -->
    <div class="admin-login" id="login-bar">
      <span style="font-size:13px;color:var(--color-text-secondary)">管理员登录：</span>
      <select id="admin-user-id" autocomplete="username" style="width:180px">
        <option value="EMP002">李四 · 工程部经理</option>
        <option value="EMP003">王五 · HR经理</option>
        <option value="EMP004">赵六 · 财务经理</option>
        <option value="EMP005">孙七 · IT经理</option>
      </select>
      <input type="password" id="admin-pwd" autocomplete="current-password" placeholder="密码" style="width:140px" value="123456">
      <button onclick="adminLogin()">登录</button>
      <span id="auth-bar"></span>
    </div>

    <!-- 概览 -->
    <div class="admin-section active" id="tab-dashboard">
      <div class="admin-header"><div class="admin-title">系统概览</div></div>
      <div class="stat-grid" id="stat-grid">
        <div class="stat-card"><div class="stat-label">员工总数</div><div class="stat-value" id="stat-users">—</div></div>
        <div class="stat-card"><div class="stat-label">待审批</div><div class="stat-value" id="stat-pending">—</div></div>
        <div class="stat-card"><div class="stat-label">本月请假</div><div class="stat-value" id="stat-leaves">—</div></div>
        <div class="stat-card"><div class="stat-label">待报销</div><div class="stat-value" id="stat-expenses">—</div></div>
      </div>
      <div class="card">
        <div class="card-title">📋 最新待审批</div>
        <div id="dashboard-pending"></div>
      </div>
    </div>

    <!-- 用户管理 -->
    <div class="admin-section" id="tab-users">
      <div class="admin-header"><div class="admin-title">用户管理</div></div>
      <div class="card">
        <div id="users-table"></div>
      </div>
    </div>

    <!-- 请假记录 -->
    <div class="admin-section" id="tab-leaves">
      <div class="admin-header"><div class="admin-title">请假记录</div></div>
      <div class="card">
        <div class="filter-bar">
          <select id="leave-status-filter">
            <option value="">全部状态</option>
            <option value="pending">待审批</option>
            <option value="approved">已通过</option>
            <option value="rejected">已驳回</option>
          </select>
          <input id="leave-user-filter" placeholder="员工ID" style="width:160px">
          <button onclick="loadLeaves()">查询</button>
        </div>
        <div id="leaves-table"></div>
      </div>
    </div>

    <!-- 审批记录 -->
    <div class="admin-section" id="tab-approvals">
      <div class="admin-header"><div class="admin-title">审批记录</div></div>
      <div class="card">
        <div class="filter-bar">
          <select id="approval-status-filter" onchange="loadApprovals()">
            <option value="pending">待审批</option>
            <option value="approved">已通过</option>
            <option value="rejected">已驳回</option>
            <option value="">全部</option>
          </select>
        </div>
        <div id="approvals-table"></div>
      </div>
    </div>

    <!-- 报销记录 -->
    <div class="admin-section" id="tab-expenses">
      <div class="admin-header"><div class="admin-title">报销记录</div></div>
      <div class="card">
        <div class="filter-bar">
          <select id="expense-status-filter" onchange="loadExpenses()">
            <option value="">全部状态</option>
            <option value="pending">待审批</option>
            <option value="approved">已通过</option>
            <option value="rejected">已驳回</option>
          </select>
        </div>
        <div id="expenses-table"></div>
      </div>
    </div>

    <!-- 评估报告 -->
    <div class="admin-section" id="tab-eval">
      <div class="admin-header">
        <div class="admin-title">评估报告</div>
        <div style="display:flex;align-items:center;gap:12px">
          <span id="eval-file" style="font-size:12px;color:var(--color-text-muted)"></span>
          <label style="font-size:12px;display:flex;align-items:center;gap:4px;cursor:pointer;user-select:none">
            <input type="checkbox" id="eval-llm" checked onchange="this.checked?this.parentElement.lastChild.textContent='LLM路由':this.parentElement.lastChild.textContent='仅关键词'">
            <span style="color:var(--color-text-muted)">LLM路由</span>
          </label>
          <label style="font-size:12px;display:flex;align-items:center;gap:4px;cursor:pointer;user-select:none">
            <input type="checkbox" id="eval-rewrite" checked onchange="this.checked?this.parentElement.lastChild.textContent='改写':this.parentElement.lastChild.textContent='原文'">
            <span style="color:var(--color-text-muted)">改写</span>
          </label>
          <select id="eval-limit" style="padding:5px 8px;border:1px solid var(--color-line);border-radius:8px;font-size:13px;font-family:inherit">
            <option value="10">10 条</option>
            <option value="20">20 条</option>
            <option value="37" selected>全部 (37条)</option>
          </select>
          <button id="eval-run-btn" onclick="runEval()" style="padding:6px 14px;background:var(--color-primary);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer">▶ 运行评估</button>
          <span id="eval-running" style="display:none;font-size:13px;color:var(--color-text-muted)">⏳ 评估中...</span>
        </div>
      </div>
      <div class="stat-grid" id="eval-stat-grid">
        <div class="stat-card"><div class="stat-label">用例总数</div><div class="stat-value" id="eval-total">—</div></div>
        <div class="stat-card"><div class="stat-label">通过率</div><div class="stat-value" id="eval-passed">—</div></div>
        <div class="stat-card"><div class="stat-label">路由准确度</div><div class="stat-value" id="eval-routing">—</div></div>
        <div class="stat-card"><div class="stat-label">工具准确度</div><div class="stat-value" id="eval-tools">—</div></div>
        <div class="stat-card"><div class="stat-label">检索准确度</div><div class="stat-value" id="eval-retrieval">—</div></div>
        <div class="stat-card"><div class="stat-label">平均耗时</div><div class="stat-value" id="eval-time">—</div></div>
        <div class="stat-card"><div class="stat-label">平均 Token</div><div class="stat-value" id="eval-tokens">—</div></div>
      </div>
      <div class="card">
        <div class="card-title">📂 分领域详情</div>
        <div id="eval-by-category"></div>
      </div>
      <div class="card">
        <div class="card-title">📋 用例明细</div>
        <div id="eval-results-table"></div>
      </div>
    </div>
  </main>
</div>

<!-- 编辑用户弹窗 -->
<div class="edit-modal hidden" id="edit-modal">
  <div class="edit-dialog">
    <h3>编辑用户</h3>
    <input type="hidden" id="edit-uid">
    <label>姓名</label><input id="edit-name">
    <label>角色</label>
    <select id="edit-role">
      <option value="employee">员工</option>
      <option value="manager">经理</option>
      <option value="hr">HR</option>
      <option value="admin">管理员</option>
    </select>
    <label>状态</label>
    <select id="edit-status">
      <option value="active">在职</option>
      <option value="inactive">离职</option>
    </select>
    <label>年假总额（天）</label><input id="edit-annual" type="number" min="0">
    <label>病假总额（天）</label><input id="edit-sick" type="number" min="0">
    <label>事假总额（天）</label><input id="edit-personal" type="number" min="0">
    <div class="edit-actions">
      <button class="btn-cancel-edit" onclick="closeEdit()">取消</button>
      <button class="btn-save-edit" onclick="saveUser()">保存</button>
    </div>
  </div>
</div>

<script>
const API = '/api';
let _token = null;

const STATUS_LABEL = {
  pending:'待审批', approved:'已通过', rejected:'已驳回',
  draft:'草稿', cancelled:'已取消', completed:'已完成',
  '待处理':'待处理', '处理中':'处理中', '已完成':'已完成', reimbursed:'已报销',
};
const STATUS_CLASS = {
  pending:'badge-pending', approved:'badge-approved', rejected:'badge-rejected',
  active:'badge-active',
};

function badge(s) {
  const label = STATUS_LABEL[s] || s;
  const cls = STATUS_CLASS[s] || 'badge-pending';
  return `<span class="badge ${cls}">${label}</span>`;
}

async function adminLogin() {
  const uid = document.getElementById('admin-user-id').value.trim();
  const pwd = document.getElementById('admin-pwd').value;
  if (!uid) return alert('请输入管理员员工ID');
  const r = await fetch(`${API}/auth/login`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({user_id: uid, password: pwd}),
  });
  if (!r.ok) return alert('登录失败');
  const d = await r.json();
  _token = d.token;
  document.getElementById('auth-bar').innerHTML =
    `已登录：<strong>${d.user.name}</strong>（${d.user.role}）`;
  loadDashboard();
}

function authHeaders() {
  return _token ? {'Authorization': 'Bearer ' + _token} : {};
}

async function apiFetch(path, opts = {}) {
  opts.headers = {...(opts.headers || {}), ...authHeaders()};
  const r = await fetch(API + path, opts);
  if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.error || r.status); }
  return r.json();
}

// ── 导航 ──────────────────────────────────────────────────────
document.querySelectorAll('.admin-nav-item').forEach(el => {
  el.addEventListener('click', () => {
    document.querySelectorAll('.admin-nav-item').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.admin-section').forEach(x => x.classList.remove('active'));
    el.classList.add('active');
    const tab = el.dataset.tab;
    document.getElementById('tab-' + tab).classList.add('active');
    if (!_token) return;
    if (tab === 'dashboard') loadDashboard();
    else if (tab === 'users') loadUsers();
    else if (tab === 'leaves') loadLeaves();
    else if (tab === 'approvals') loadApprovals();
    else if (tab === 'expenses') loadExpenses();
    else if (tab === 'eval') loadEval();
  });
});

// ── 概览 ──────────────────────────────────────────────────────
async function loadDashboard() {
  try {
    const [users, leaves, approvals, expenses] = await Promise.all([
      apiFetch('/admin/users'),
      apiFetch('/admin/leaves?status=pending&limit=5'),
      apiFetch('/admin/approvals?status=pending&limit=5'),
      apiFetch('/admin/expenses?status=pending'),
    ]);
    document.getElementById('stat-users').textContent = users.total;
    document.getElementById('stat-pending').textContent = approvals.total;
    document.getElementById('stat-leaves').textContent = leaves.total;
    document.getElementById('stat-expenses').textContent = expenses.total;

    const rows = approvals.approvals.slice(0, 5).map(a =>
      `<tr><td>${a.record_type === 'leave' ? '请假' : '报销'}</td>
       <td>${a.record_id.slice(0,8)}…</td>
       <td>${a.approver_name}</td>
       <td>${a.approver_role}</td>
       <td>${a.created_at.slice(0,16)}</td>
       <td>
         <button class="btn-sm btn-approve" onclick="quickApprove('${a.id}')">通过</button>
         <button class="btn-sm btn-reject" onclick="quickReject('${a.id}')">驳回</button>
       </td></tr>`
    ).join('');
    document.getElementById('dashboard-pending').innerHTML = rows
      ? `<table><thead><tr><th>类型</th><th>记录ID</th><th>审批人</th><th>角色</th><th>时间</th><th>操作</th></tr></thead><tbody>${rows}</tbody></table>`
      : '<div style="color:var(--color-text-muted);padding:12px 0">暂无待审批</div>';
  } catch(e) { console.error(e); }
}

// ── 用户 ──────────────────────────────────────────────────────
async function loadUsers() {
  try {
    const d = await apiFetch('/admin/users');
    const rows = d.users.map(u =>
      `<tr>
        <td>${u.user_id}</td><td>${u.name}</td>
        <td>${u.department_name}</td>
        <td>${u.manager_name || '—'}</td>
        <td>${badge(u.role)}</td>
        <td>${badge(u.status)}</td>
        <td>${u.annual}/${u.sick}/${u.personal}</td>
        <td><button class="btn-sm btn-edit" onclick='openEdit(${JSON.stringify(u)})'>编辑</button></td>
      </tr>`
    ).join('');
    document.getElementById('users-table').innerHTML =
      `<table><thead><tr><th>ID</th><th>姓名</th><th>部门</th><th>上级</th><th>角色</th><th>状态</th><th>年/病/事假</th><th>操作</th></tr></thead><tbody>${rows}</tbody></table>`;
  } catch(e) { alert('加载失败: ' + e.message); }
}

function openEdit(u) {
  document.getElementById('edit-uid').value = u.user_id;
  document.getElementById('edit-name').value = u.name;
  document.getElementById('edit-role').value = u.role;
  document.getElementById('edit-status').value = u.status;
  document.getElementById('edit-annual').value = u.annual;
  document.getElementById('edit-sick').value = u.sick;
  document.getElementById('edit-personal').value = u.personal;
  document.getElementById('edit-modal').classList.remove('hidden');
}
function closeEdit() { document.getElementById('edit-modal').classList.add('hidden'); }

async function saveUser() {
  const uid = document.getElementById('edit-uid').value;
  const body = {
    name: document.getElementById('edit-name').value,
    role: document.getElementById('edit-role').value,
    status: document.getElementById('edit-status').value,
    annual: parseInt(document.getElementById('edit-annual').value),
    sick: parseInt(document.getElementById('edit-sick').value),
    personal: parseInt(document.getElementById('edit-personal').value),
  };
  try {
    await apiFetch(`/admin/users/${uid}`, {
      method: 'PUT', headers: {'Content-Type':'application/json'},
      body: JSON.stringify(body),
    });
    closeEdit(); loadUsers();
  } catch(e) { alert('保存失败: ' + e.message); }
}

// ── 请假 ──────────────────────────────────────────────────────
async function loadLeaves() {
  const status = document.getElementById('leave-status-filter').value;
  const uid = document.getElementById('leave-user-filter').value.trim();
  let path = `/admin/leaves?limit=100`;
  if (status) path += `&status=${status}`;
  if (uid) path += `&user_id=${uid}`;
  try {
    const d = await apiFetch(path);
    const rows = d.leaves.map(l =>
      `<tr><td>${l.user_name}</td><td>${l.leave_type}</td>
       <td>${l.start_date} ~ ${l.end_date}</td>
       <td>${l.total_days}天</td>
       <td>${badge(l.status)}</td>
       <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.reason||'—'}</td>
       <td>${l.created_at.slice(0,10)}</td></tr>`
    ).join('');
    document.getElementById('leaves-table').innerHTML =
      `<table><thead><tr><th>员工</th><th>类型</th><th>日期</th><th>天数</th><th>状态</th><th>原因</th><th>提交时间</th></tr></thead><tbody>${rows||'<tr><td colspan="7" style="text-align:center;color:var(--color-text-muted)">暂无记录</td></tr>'}</tbody></table>`;
  } catch(e) { alert('加载失败: ' + e.message); }
}

// ── 审批 ──────────────────────────────────────────────────────
async function loadApprovals() {
  const status = document.getElementById('approval-status-filter').value;
  let path = `/admin/approvals?limit=100`;
  if (status) path += `&status=${status}`;
  try {
    const d = await apiFetch(path);
    const rows = d.approvals.map(a =>
      `<tr>
        <td>${a.record_type === 'leave' ? '请假' : '报销'}</td>
        <td style="font-family:monospace;font-size:12px">${a.record_id.slice(0,10)}…</td>
        <td>${a.approver_name}</td>
        <td>${a.approver_role}</td>
        <td>${badge(a.status)}</td>
        <td>${a.comment||'—'}</td>
        <td>${(a.decided_at||a.created_at).slice(0,16)}</td>
        ${a.status==='pending' ? `<td>
          <button class="btn-sm btn-approve" onclick="quickApprove('${a.id}')">通过</button>
          <button class="btn-sm btn-reject" onclick="quickReject('${a.id}')">驳回</button>
        </td>` : '<td>—</td>'}
      </tr>`
    ).join('');
    document.getElementById('approvals-table').innerHTML =
      `<table><thead><tr><th>类型</th><th>记录ID</th><th>审批人</th><th>角色</th><th>状态</th><th>意见</th><th>时间</th><th>操作</th></tr></thead><tbody>${rows||'<tr><td colspan="8" style="text-align:center;color:var(--color-text-muted)">暂无记录</td></tr>'}</tbody></table>`;
  } catch(e) { alert('加载失败: ' + e.message); }
}

// ── 报销 ──────────────────────────────────────────────────────
async function loadExpenses() {
  const status = document.getElementById('expense-status-filter').value;
  let path = `/admin/expenses?limit=100`;
  if (status) path += `&status=${status}`;
  try {
    const d = await apiFetch(path);
    const rows = d.expenses.map(e =>
      `<tr><td>${e.user_name}</td><td>${e.expense_type}</td>
       <td>¥${e.amount.toFixed(2)}</td>
       <td>${badge(e.status)}</td>
       <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.description||'—'}</td>
       <td>${e.created_at.slice(0,10)}</td></tr>`
    ).join('');
    document.getElementById('expenses-table').innerHTML =
      `<table><thead><tr><th>员工</th><th>类型</th><th>金额</th><th>状态</th><th>说明</th><th>提交时间</th></tr></thead><tbody>${rows||'<tr><td colspan="6" style="text-align:center;color:var(--color-text-muted)">暂无记录</td></tr>'}</tbody></table>`;
  } catch(e) { alert('加载失败: ' + e.message); }
}

// ── 快速审批 ──────────────────────────────────────────────────
async function quickApprove(stepId) {
  try {
    await apiFetch(`/approvals/${stepId}/approve`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({comment: '管理后台审批通过'}),
    });
    loadDashboard(); loadApprovals();
  } catch(e) { alert('操作失败: ' + e.message); }
}

async function quickReject(stepId) {
  const comment = prompt('请输入驳回理由：');
  if (comment === null) return;
  try {
    await apiFetch(`/approvals/${stepId}/reject`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({comment: comment || '管理后台驳回'}),
    });
    loadDashboard(); loadApprovals();
  } catch(e) { alert('操作失败: ' + e.message); }
}

// ── 评估报告 ──────────────────────────────────────────────────
async function runEval() {
  const btn = document.getElementById('eval-run-btn');
  const hint = document.getElementById('eval-running');
  btn.disabled = true;
  btn.textContent = '⏳ 运行中...';
  hint.style.display = 'inline';
  const limit = document.getElementById('eval-limit').value || '20';
  const useLlm = document.getElementById('eval-llm').checked;
  const useRewrite = document.getElementById('eval-rewrite').checked;
  try {
    await apiFetch('/admin/eval/run?limit=' + limit + '&llm=' + useLlm + '&rewrite=' + useRewrite, { method: 'POST' });
  } catch(e) {
    alert('评估运行失败: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '▶ 运行评估';
    hint.style.display = 'none';
  }
  loadEval();
}

async function loadEval() {
  try {
    const d = await apiFetch('/admin/eval/latest');
    const r = d.report;
    document.getElementById('eval-file').textContent = '来源: ' + d.file;

    document.getElementById('eval-total').textContent = r.total;
    document.getElementById('eval-passed').textContent =
      r.passed + '/' + r.total + ' (' + (r.passed / Math.max(r.total, 1) * 100).toFixed(1) + '%)';
    document.getElementById('eval-routing').textContent = (r.routing_accuracy * 100).toFixed(1) + '%';
    document.getElementById('eval-tools').textContent = (r.tool_accuracy * 100).toFixed(1) + '%';
    const retrievalAcc = r.retrieval_accuracy != null ? r.retrieval_accuracy : 0;
    document.getElementById('eval-retrieval').textContent = (retrievalAcc * 100).toFixed(1) + '%';
    document.getElementById('eval-time').textContent = r.avg_time_ms.toFixed(0) + ' ms';
    document.getElementById('eval-tokens').textContent = r.avg_tokens.toFixed(0);

    // 分领域
    const cats = r.by_category;
    let catHtml = '<table><thead><tr><th>领域</th><th>用例数</th><th>路由准确度</th><th>工具准确度</th><th>检索准确度</th></tr></thead><tbody>';
    for (const [cat, st] of Object.entries(cats)) {
      catHtml += `<tr><td><strong>${cat}</strong></td><td>${st.total}</td>
        <td>${st.routing_accuracy != null ? (st.routing_accuracy * 100).toFixed(1) + '%' : '—'}</td>
        <td>${st.tool_total > 0 ? (st.tool_accuracy * 100).toFixed(1) + '%' : '—'}</td>
        <td>${st.retrieval_total > 0 ? (st.retrieval_accuracy * 100).toFixed(1) + '%' : '—'}</td></tr>`;
    }
    catHtml += '</tbody></table>';
    document.getElementById('eval-by-category').innerHTML = catHtml;

    // 用例明细
    const results = r.results || [];
    const rows = results.map(c =>
      `<tr>
        <td>${c.case_id}</td>
        <td title="${c.query}">${c.query.slice(0, 30)}${c.query.length > 30 ? '…' : ''}</td>
        <td>${c.category}</td>
        <td>${c.expected_agent}</td>
        <td>${c.actual_agent}</td>
        <td>${c.routing_correct ? '✅' : '❌'}</td>
        <td>${c.expected_tools.join(', ') || '—'}</td>
        <td>${c.actual_tools.join(', ') || '—'}</td>
        <td>${c.tools_correct ? '✅' : '❌'}</td>
        <td>${c.retrieved_sources ? c.retrieved_sources.join(', ').slice(0, 40) : '—'}</td>
        <td>${c.expected_sources && c.expected_sources.length ? (c.retrieval_correct ? '✅' : '❌') : '—'}</td>
        <td>${c.processing_time_ms}ms</td>
      </tr>`
    ).join('');
    document.getElementById('eval-results-table').innerHTML =
      `<table><thead><tr>
        <th>ID</th><th>问题</th><th>领域</th><th>期望Agent</th><th>实际Agent</th>
        <th>路由</th><th>期望工具</th><th>实际工具</th><th>工具</th>
        <th>检索来源</th><th>检索</th><th>耗时</th>
      </tr></thead><tbody>${rows || '<tr><td colspan="12" style="text-align:center;color:var(--color-text-muted)">暂无记录</td></tr>'}</tbody></table>`;

  } catch(e) {
    document.getElementById('eval-total').textContent = '—';
    document.getElementById('eval-passed').textContent = e.message;
    document.getElementById('eval-routing').textContent = '—';
    document.getElementById('eval-tools').textContent = '—';
    document.getElementById('eval-retrieval').textContent = '—';
    document.getElementById('eval-time').textContent = '—';
    document.getElementById('eval-tokens').textContent = '—';
    document.getElementById('eval-by-category').innerHTML = '';
    document.getElementById('eval-results-table').innerHTML = '';
    document.getElementById('eval-file').textContent = '暂无报告';
  }
}
</script>
</body>
